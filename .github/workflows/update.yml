name: Update LaunchPad Widget

# Long-lived daemon that keeps the Discord profile widget in sync with the
# next scheduled space launch. Exits cleanly before GitHub's 6h hard kill
# and self-dispatches the next run.

on:
  workflow_dispatch:
  schedule:
    # Safety net in case the self-dispatch step fails for any reason.
    - cron: "0 */6 * * *"

permissions:
  actions: write
  contents: read

# Only one live updater at a time.
concurrency:
  group: launchpad-widget-daemon
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run widget daemon
        env:
          DISCORD_APPLICATION_ID: ${{ secrets.DISCORD_APPLICATION_ID }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          # Optional: a channel the bot can write to.  When set, picked
          # images are uploaded there first to obtain a cdn.discordapp.com
          # URL that the widget can render.
          DISCORD_TARGET_CHANNEL_ID: ${{ secrets.DISCORD_TARGET_CHANNEL_ID }}
          UPDATE_INTERVAL_SECONDS: ${{ vars.UPDATE_INTERVAL_SECONDS }}
          MIN_PATCH_INTERVAL_SECONDS: ${{ vars.MIN_PATCH_INTERVAL_SECONDS }}
          MAX_RUNTIME_SECONDS: ${{ vars.MAX_RUNTIME_SECONDS }}
          PREFERRED_SOURCE: ${{ vars.PREFERRED_SOURCE }}
          CACHE_TTL_SECONDS: ${{ vars.CACHE_TTL_SECONDS }}
          DRY_RUN: ${{ vars.DRY_RUN }}
        run: python widget.py

      # Only self-dispatch on clean exit.  On crash, the schedule cron
      # above is the fallback (no infinite loop).
      - name: Trigger next run
        if: success()
        run: |
          echo "Triggering next workflow run..."
          curl -sS -f -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/update.yml/dispatches \
            -d '{"ref":"${{ github.ref_name }}"}'
          echo "Next run queued."
